h2 {

.services {

        /* Navbar container style */
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items:center;
            background-color: #333;
            padding: 1rem 2rem;
            color: white;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: bold;
        }

        /* Navigation menu links layout */
        .nav-links {
            display: flex;
            list-style: none;
            gap: 20px;
        }

        .nav-links a {
            color: white;
            text-decoration: none;
            font-size: 1rem;
            transition: color 0.3s;
        }

        .nav-links a:hover {
            color: #04AA6D;
        }
       /* put Hamburger button firt */
        /* Hamburger button layout (hidden by default on desktop) */
        .toggle-btn {
            display: none;
            flex-direction: column;
            cursor: pointer;
            gap: 5px;
            background: none;
          border: none;
        }

        .toggle-btn .bar {
            width: 25px;
            height: 3px;
            background-color: white;
            transition: all 0.3s ease;
        }

        /* Responsive Mobile Styles */
        @media (max-width: 768px) {
            .toggle-btn {
                display: flex; /* Show hamburger icon on small screens */
            }

            .nav-links {
                display: none; /* Hide standard links */
                flex-direction: column;
                width: 100%;
                position: absolute;
                top: 60px;
                left: 0;
                background-color: #333;
                padding: 1rem;
                text-align: center;
                gap: 15px;
            }

            /* JavaScript toggles this class to show/hide the menu */
            .nav-links.active {
                display: flex;
            }
        }
                * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Arial Black', Impact, sans-serif;
</style>
</head>
<body>
    <!-- Navigation Bar Structure -->
    <nav class="navbar">
        
        <!-- Hamburger Icon Button -->

        <!-- Menu Links -->

            <li><a href="contact.html">Contact</a></li>
        </ul>
                   <div class="logo">Gabbi Plumbing & Consult</div>
    </nav>

    <!-- Toggle Action Script -->
    <script>
        const toggleButton = document.getElementById('navbar-toggle');
        const navMenu = document.getElementById('nav-menu');

        // Listen for user click to toggle visibility
        toggleButton.addEventListener('click', () => {
            navMenu.classList.toggle('active');
        });
    </script>
